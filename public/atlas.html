<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atlas Maker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a; color: #ddd;
    font-family: monospace; font-size: 12px;
    display: flex; height: 100vh; overflow: hidden;
}

/* ── Left panel ── */
#left {
    width: 280px; flex-shrink: 0;
    background: #222; border-right: 1px solid #444;
    display: flex; flex-direction: column; gap: 0;
    overflow: hidden;
}

.panel { padding: 10px 12px; border-bottom: 1px solid #333; }
.panel h3 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 8px; }

input[type=file]   { color: #ccc; font-size: 11px; width: 100%; }
input[type=range]  { width: 100%; margin-top: 4px; }
input[type=text]   { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 4px 6px; font-family: monospace; font-size: 12px; }

button { padding: 5px 10px; background: #2a2a2a; border: 1px solid #444; color: #ccc; font-family: monospace; font-size: 11px; cursor: pointer; }
button:hover { background: #333; }

#coords { font-size: 13px; color: #4af; letter-spacing: 1px; }

/* ── Selection display ── */
#sel-box {
    background: #1a2a1a; border: 1px solid #3a5a3a;
    padding: 8px; line-height: 1.9; color: #8f8;
    font-size: 12px;
}
#sel-box .val { color: #fff; }
#sel-copy { margin-top: 6px; font-size: 10px; color: #4af; word-break: break-all; }

/* ── Saved regions ── */
#regions { flex: 1; overflow-y: auto; padding: 8px 12px; }
.region {
    background: #1a1a2a; border: 1px solid #334; padding: 6px 8px;
    margin-bottom: 5px; cursor: pointer; transition: background 0.1s;
    display: flex; align-items: center; gap: 6px;
}
.region:hover { background: #22224a; }
.region .rname { color: #4af; font-size: 10px; letter-spacing: 1px; flex: 1; }
.region .rvals { color: #8f8; font-size: 11px; }
.region .rdel  { color: #555; font-size: 14px; line-height: 1; flex-shrink: 0; }
.region .rdel:hover { color: #f44; }

#actions { padding: 8px 12px; border-top: 1px solid #333; display: flex; gap: 6px; }
#actions button { flex: 1; }

/* ── Canvas area ── */
#right { flex: 1; overflow: auto; position: relative; background: #111; cursor: crosshair; }
#sheet   { display: block; image-rendering: pixelated; }
#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="left">

    <div class="panel">
        <h3>Image</h3>
        <input type="file" id="file-input" accept="image/*">
        <div style="margin-top:8px;">
            <label>Zoom <span id="zoom-val">4×</span></label>
            <input type="range" id="zoom" min="1" max="16" value="4">
        </div>
    </div>

    <div class="panel">
        <h3>Cursor</h3>
        <div id="coords">x: – &nbsp; y: –</div>
    </div>

    <div class="panel">
        <h3>Selection</h3>
        <div id="sel-box">
            x: <span class="val" id="s-x">–</span>
            &nbsp; y: <span class="val" id="s-y">–</span><br>
            w: <span class="val" id="s-w">–</span>
            &nbsp; h: <span class="val" id="s-h">–</span>
        </div>
        <div id="sel-copy"></div>
        <div style="display:flex; gap:6px; margin-top:8px; align-items:center;">
            <input type="text" id="region-name" placeholder="Name (e.g. capLeft)">
            <button onclick="saveRegion()">Save</button>
        </div>
    </div>

    <div id="regions"></div>

    <div id="actions">
        <button onclick="copyAll()">Copy all JSON</button>
        <button onclick="clearAll()">Clear</button>
    </div>
</div>

<div id="right">
    <canvas id="sheet"></canvas>
    <canvas id="overlay"></canvas>
</div>

<script>
const sheetCanvas   = document.getElementById('sheet');
const overlayCanvas = document.getElementById('overlay');
const sCtx = sheetCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');

let img      = null;
let zoom     = 4;
let drag     = null;
let sel      = null;    // current drag rect
let committed = null;   // last confirmed rect
let regions  = [];

// ── Load ──────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const image = new Image();
    image.onload = () => { img = image; redraw(); };
    image.src = url;
});

document.getElementById('zoom').addEventListener('input', e => {
    zoom = +e.target.value;
    document.getElementById('zoom-val').textContent = zoom + '×';
    if (img) redraw();
});

// ── Draw ──────────────────────────────────────────────────────────
function redraw() {
    const w = img.width * zoom, h = img.height * zoom;
    sheetCanvas.width  = overlayCanvas.width  = w;
    sheetCanvas.height = overlayCanvas.height = h;
    overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
    sCtx.imageSmoothingEnabled = false;
    sCtx.drawImage(img, 0, 0, w, h);
    drawGrid();
    redrawOverlay();
}

function drawGrid() {
    sCtx.save();
    sCtx.strokeStyle = 'rgba(255,255,255,0.04)';
    sCtx.lineWidth = 0.5;
    for (let x = 0; x <= img.width; x++) {
        sCtx.beginPath(); sCtx.moveTo(x*zoom, 0); sCtx.lineTo(x*zoom, img.height*zoom); sCtx.stroke();
    }
    for (let y = 0; y <= img.height; y++) {
        sCtx.beginPath(); sCtx.moveTo(0, y*zoom); sCtx.lineTo(img.width*zoom, y*zoom); sCtx.stroke();
    }
    sCtx.restore();
}

function drawRect(ctx, r, stroke, fill) {
    ctx.save();
    ctx.strokeStyle = stroke; ctx.lineWidth = 1;
    ctx.strokeRect(r.x*zoom + 0.5, r.y*zoom + 0.5, r.w*zoom, r.h*zoom);
    ctx.fillStyle = fill;
    ctx.fillRect(r.x*zoom, r.y*zoom, r.w*zoom, r.h*zoom);
    ctx.restore();
}

function redrawOverlay() {
    oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    // Saved regions
    const colors = ['#4af','#f84','#8f4','#f4a','#af4','#a4f'];
    regions.forEach((r, i) => {
        const c = colors[i % colors.length];
        drawRect(oCtx, r, c, c.replace(')', ',0.08)').replace('#', 'rgba(').replace(/([0-9a-f]{2})/gi, (m, p) => parseInt(p,16)+','));
        // Label
        oCtx.save();
        oCtx.fillStyle = c;
        oCtx.font = `${Math.max(9, zoom*2)}px monospace`;
        oCtx.fillText(r.name, r.x*zoom + 2, r.y*zoom + Math.max(10, zoom*2));
        oCtx.restore();
    });
    // Saved regions with simpler color fill
    regions.forEach((r, i) => {
        const c = colors[i % colors.length];
        oCtx.save();
        oCtx.strokeStyle = c; oCtx.lineWidth = 1;
        oCtx.strokeRect(r.x*zoom+0.5, r.y*zoom+0.5, r.w*zoom, r.h*zoom);
        oCtx.fillStyle = hexToRgba(c, 0.08);
        oCtx.fillRect(r.x*zoom, r.y*zoom, r.w*zoom, r.h*zoom);
        oCtx.fillStyle = c;
        oCtx.font = `${Math.max(9, zoom*1.5)}px monospace`;
        oCtx.fillText(r.name, r.x*zoom+3, r.y*zoom+Math.max(10,zoom*1.5)+2);
        oCtx.restore();
    });
    // Active selection
    const active = sel || committed;
    if (active) drawRect(oCtx, active, '#fff', 'rgba(255,255,255,0.1)');
}

function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
}

// ── Mouse ─────────────────────────────────────────────────────────
const right = document.getElementById('right');

right.addEventListener('mousemove', e => {
    if (!img) return;
    const { ix, iy } = imgXY(e);
    document.getElementById('coords').innerHTML = `x: ${ix} &nbsp; y: ${iy}`;
    if (drag) {
        sel = makeRect(drag.sx, drag.sy, ix, iy);
        showSel(sel);
        redrawOverlay();
    }
});

right.addEventListener('mousedown', e => {
    if (!img) return;
    const { ix, iy } = imgXY(e);
    drag = { sx: ix, sy: iy };
    sel  = makeRect(ix, iy, ix, iy);
});

right.addEventListener('mouseup', e => {
    if (drag && sel) { committed = { ...sel }; showSel(committed); }
    drag = null; sel = null;
    redrawOverlay();
});

right.addEventListener('mouseleave', () => { drag = null; });

function imgXY(e) {
    const rect = sheetCanvas.getBoundingClientRect();
    return {
        ix: Math.min(img.width  - 1, Math.max(0, Math.floor((e.clientX - rect.left) / zoom))),
        iy: Math.min(img.height - 1, Math.max(0, Math.floor((e.clientY - rect.top)  / zoom))),
    };
}

function makeRect(x1, y1, x2, y2) {
    return { x: Math.min(x1,x2), y: Math.min(y1,y2), w: Math.abs(x2-x1)+1, h: Math.abs(y2-y1)+1 };
}

// ── Selection UI ──────────────────────────────────────────────────
function showSel(r) {
    document.getElementById('s-x').textContent = r.x;
    document.getElementById('s-y').textContent = r.y;
    document.getElementById('s-w').textContent = r.w;
    document.getElementById('s-h').textContent = r.h;
    document.getElementById('sel-copy').textContent = selJson(r);
}

function selJson(r, name) {
    const n = name ? `"${name}": ` : '';
    return `${n}{ x: ${r.x}, y: ${r.y}, w: ${r.w}, h: ${r.h} }`;
}

document.getElementById('region-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveRegion();
});

// ── Regions ───────────────────────────────────────────────────────
function saveRegion() {
    if (!committed) return;
    const name = document.getElementById('region-name').value.trim() || `region${regions.length}`;
    regions.push({ ...committed, name });
    document.getElementById('region-name').value = '';
    renderRegions();
    redrawOverlay();
}

function renderRegions() {
    const el = document.getElementById('regions');
    el.innerHTML = '';
    regions.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'region';
        div.innerHTML = `
            <div>
                <div class="rname">${r.name}</div>
                <div class="rvals">${selJson(r)}</div>
            </div>
            <span class="rdel" title="Delete">×</span>
        `;
        div.addEventListener('click', e => {
            if (e.target.classList.contains('rdel')) {
                regions.splice(i, 1); renderRegions(); redrawOverlay(); return;
            }
            navigator.clipboard.writeText(selJson(r, r.name));
            div.style.background = '#223322';
            setTimeout(() => div.style.background = '', 300);
        });
        el.appendChild(div);
    });
}

function copyAll() {
    const text = 'const ATLAS = {\n' +
        regions.map(r => `    ${selJson(r, r.name)},`).join('\n') +
        '\n};';
    navigator.clipboard.writeText(text);
}

function clearAll() { regions = []; renderRegions(); redrawOverlay(); }
</script>
</body>
</html>
